<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Edu CRUD{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 960px; margin: 0 auto; padding: 1rem; }
        header nav a { margin-right: 1rem; }
        table { border-collapse: collapse; width: 100%; margin-top: 1rem; }
        table, th, td { border: 1px solid #ccc; }
        th, td { padding: 0.5rem; text-align: left; }
        .actions a { margin-right: 0.5rem; }
        .form-container { max-width: 560px; }
        .button { display: inline-block; padding: 0.5rem 0.75rem; background: #0078d4; color: white; text-decoration: none; border-radius: 4px; }
        .button-danger { background: #d93025; }
        .button-secondary { background: #6c757d; }
    </style>
</head>
<body>
<header>
    <nav>
        <a href="{% url 'edu:index' %}">Home</a>
        <a href="{% url 'edu:autor_list' %}">Autores</a>
        <a href="{% url 'edu:editora_list' %}">Editoras</a>
        <a href="{% url 'edu:livro_list' %}">Livros</a>
        <a href="{% url 'edu:publica_list' %}">Publicações</a>
    </nav>
</header>
<hr>
<main>
    {% block content %}{% endblock %}
</main>
</body>
</html>
